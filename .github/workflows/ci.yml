name: CI

# Validate every pull request (and pushes to non-main branches) WITHOUT
# publishing. The publish workflow stays dedicated to pushes on `main`.
on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  test:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:run
